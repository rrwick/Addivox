site_name: Addivox

theme:
  name: material
  features:
    - navigation.sections
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra:
  generator: false

extra_css:
  - assets/custom.css

markdown_extensions:
  - toc:
      toc_depth: 0

nav:
  - Home: index.md
  - Getting Started:
      - Demo version: demo.md
      - Purchasing: purchasing.md
      - Installation – macOS: installation_macos.md
      - Installation – Windows: installation_windows.md
  - Using Addivox:
      - Main UI: main_ui.md
      - Patches: patches.md
      - EQ: eq.md
      - Per-harmonic settings: per-harmonic_settings.md
      - Key notes and interpolation: key_notes_and_interpolation.md
      - Pitch settings: pitch_settings.md
      - Global settings: global_settings.md
      - Effects: effects.md
  - Support:
      - Videos: videos.md
      - FAQ and miscellaneous tips: faq_and_miscellaneous_tips.md
      - Support and feedback: support_and_feedback.md
      - License: license.md
